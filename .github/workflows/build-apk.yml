name: Build Screenshot Blocked APK

on:
  push:
    branches: [ main, master ] # ඔබ කෝඩ් එක අප්ඩේට් කරන හැම පාරම ඉබේම APK එක හැදේ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create teallanka com.teallanka.app TealLanka
        cd teallanka
        cordova platform add android
        cordova plugin add cordova-plugin-privacyscreen
        
        # config.xml එකට ඔබේ GitHub URL එක සහ ආරක්ෂිත කෝඩ් ඇතුළත් කිරීම
        echo '<widget id="com.teallanka.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">' > config.xml
        echo '  <name>TealLanka</name>' >> config.xml
        echo '  <description>Teal Lanka App</description>' >> config.xml
        echo '  <author email="dev@callback.com" href="http://cordova.io">Teal Lanka Team</author>' >> config.xml
        echo '  <content src="https://adminasasalanka.github.io/Teal-Lanka-Daily-Production/" />' >> config.xml
        echo '  <allow-navigation href="https://adminasasalanka.github.io/*" />' >> config.xml
        echo '  <allow-navigation href="http://*/*" />' >> config.xml
        echo '  <allow-navigation href="https://*/*" />' >> config.xml
        echo '  <plugin name="cordova-plugin-privacyscreen" spec="^1.0.0" />' >> config.xml
        echo '</widget>' > config.xml

    - name: Build Android APK
      run: |
        cd teallanka
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Screenshot-Blocked-APK
        path: teallanka/platforms/android/app/build/outputs/apk/debug/app-debug.apk
