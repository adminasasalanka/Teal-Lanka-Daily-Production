name: Build Screenshot Blocked APK with Custom Icon

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create teallanka com.teallanka.app TealLanka
        cd teallanka
        cordova platform add android
        cordova plugin add cordova-plugin-privacyscreen
        
        # Icon folder එක හදාගෙන icon.png එක copy කරනවා
        mkdir -p res
        if [ -f "../icon.png" ]; then
          cp ../icon.png res/icon.png
        fi
        
        # නිවැරදි config.xml එක සෑදීම
        cat <<EOF > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.teallanka.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>TealLanka</name>
            <description>Teal Lanka App</description>
            <author email="dev@callback.com" href="http://cordova.io">Teal Lanka Team</author>
            <content src="https://adminasasalanka.github.io/Teal-Lanka-Daily-Production/" />
            <access origin="*" />
            <allow-navigation href="https://adminasasalanka.github.io/*" />
            <allow-navigation href="http://*/*" />
            <allow-navigation href="https://*/*" />
            <icon src="res/icon.png" />  <plugin name="cordova-plugin-privacyscreen" spec="^1.0.0" />
        </widget>
        EOF

    - name: Build Android APK
      run: |
        cd teallanka
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Screenshot-Blocked-APK
        path: teallanka/platforms/android/app/build/outputs/apk/debug/app-debug.apk
