<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teal Lanka - Monthly Production Books</title>
    <style>
        /* Security Fix: Prevent Selection and Copying */
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow-y: auto; 
            overflow-x: hidden; 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            color: #333; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Security Blackout Overlay */
        #securityOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 999999;
            color: white;
            text-align: center;
            padding-top: 50vh;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
        }

        @media print {
            body { display: none !important; }
        }

        /* 💡 Header එක උඩම ස්ථාවරව තියෙන්න සහ Data Row එක වැහෙන්නේ නැතිවෙන්න padding එක හැදුවා */
        .container { box-sizing: border-box; padding: 10px; padding-top: 195px; }
        .fixed-complete-header { position: fixed; top: 0; left: 0; width: 100%; background-color: #f4f4f9; z-index: 1000; padding: 10px 10px 0 10px; box-sizing: border-box; }
        h2 { text-align: center; color: #28a745; margin: 3px 0; font-size: 18px; }
        h4 { text-align: center; margin: 0 0 8px 0; color: #555; font-size: 13px; }
        .nav-links { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .nav-links a { text-decoration: none; padding: 6px 12px; background: #007acc; color: white; border-radius: 5px; font-size: 13px; font-weight: bold; }
        .nav-links a.active { background: #28a745; }
        .filter-area { background: #e9ecef; padding: 6px; border-radius: 8px; margin-bottom: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; justify-content: center; }
        .filter-group { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .filter-group label { font-weight: bold; }
        .filter-group select, .filter-group input { padding: 5px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 12px; }
        
        /* 💡 Header එක එහෙම්මම ලොක් වෙලා තියෙද්දී ඩේටා ටික විතරක් Scroll වෙන්න සීමාවන් හැදුවා */
        .table-responsive { 
            width: 100%; 
            overflow-x: auto; 
            overflow-y: auto;
            max-height: calc(100vh - 215px); /* Screen එකේ ඉතිරි උසට විතරක් Scrollbar එක සීමා කළා */
            border: 1px solid #aaaaaa; 
            background: white; 
            -webkit-overflow-scrolling: touch; 
        }
        
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; table-layout: fixed; }
        th, td { border: 1px solid #aaaaaa; padding: 8px; text-align: center; white-space: nowrap; box-sizing: border-box; }
        .col-date { width: 50px; }
        .col-code { width: 90px; }
        .col-var { width: 150px; }
        .col-num { width: 65px; }
        .col-rem { width: 150px; }
        
        /* 💡 Header Table එක හැමවෙලේම උඩින්ම Sticky වෙලා ලොක් වෙන්න CSS හැදුවා */
        .header-table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #28a745; 
            color: white; 
            font-weight: bold; 
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1); 
            position: sticky;
            top: 0;
            z-index: 1002;
        }
        .header-table th { background-color: #28a745; padding: 10px 8px; border: 1px solid #aaaaaa; }
        td[rowspan] { position: sticky; left: 0; background-color: #ffffff !important; z-index: 5; font-weight: bold; }
        .filled-row { background-color: #e8f5e9; font-weight: bold; color: #1b5e20; }
        .empty-row { background-color: #ffffff; color: #333; }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableSecurityKeys(event);">

<div id="securityOverlay">🔒 Screen Capture Restricted!</div>

<div class="fixed-complete-header">
    <div class="nav-links">
        <a href="index.html">📄 Data Entry Form</a>
        <a href="operator1.html" class="active">📊 View Monthly Books</a>
    </div>

    <h2>MONTHLY PRODUCTION SHEETS</h2>
    <h4>Teal Lanka Production Plan</h4>
    
    <div class="filter-area">
        <div class="filter-group">
            <label for="operatorFilter">Select Operator:</label>
            <select id="operatorFilter">
                <option value="" disabled selected hidden>Select Operator</option>
                <option value="Operator 1">Operator RS</option>
                <option value="Operator 2">Operator TK</option>
                <option value="Operator 3">Operator K</option>
                <option value="Operator 4">Operator QST</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="monthFilter">Select Month & Year:</label>
            <input type="month" id="monthFilter">
        </div>
    </div>

    <table class="header-table">
        <thead>
            <tr>
                <th class="col-date">Date</th>
                <th class="col-code">Plant Code</th>
                <th class="col-var">Variety</th>
                <th class="col-num">WK</th>
                <th class="col-num">Transfer</th>
                <th class="col-num">Used</th>
                <th class="col-num">Multy</th>
                <th class="col-num">Rooting</th>
                <th class="col-rem">Remarks</th>
            </tr>
        </thead>
    </table>
</div>

<div class="container">
    <div class="table-responsive">
        <table>
            <colgroup>
                <col class="col-date"><col class="col-code"><col class="col-var"><col class="col-num">
                <col class="col-num"><col class="col-num"><col class="col-num"><col class="col-num"><col class="col-rem">
            </colgroup>
            <tbody id="productionTableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
    // Robust WebIntoApp Security Controls
    const overlay = document.getElementById('securityOverlay');

    function triggerBlackout() {
        overlay.style.display = 'block';
        setTimeout(() => { overlay.style.display = 'none'; }, 1500);
    }

    document.addEventListener('visibilitychange', () => { if (document.hidden) triggerBlackout(); });
    window.addEventListener('blur', triggerBlackout);
    window.addEventListener('pagehide', triggerBlackout);

    function disableSecurityKeys(e) {
        if (e.keyCode == 44 || (e.metaKey && e.shiftKey && (e.keyCode == 52 || e.keyCode == 51)) || (e.ctrlKey && e.shiftKey && e.keyCode == 83)) {
            e.preventDefault();
            triggerBlackout();
            return false;
        }
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 67 || e.keyCode == 83 || e.keyCode == 80))) {
            e.preventDefault();
            return false;
        }
    }
    
    document.addEventListener('copy', (e) => {
        e.clipboardData.setData('text/plain', 'Not Allowed');
        e.preventDefault();
    });

    const firebaseConfig = {
        apiKey: "AIzaSyBRLKdJqdC4kwT4qPvHBPjf1vX2viSBxqg",
        authDomain: "teal-lanka-daily-production.firebaseapp.com",
        projectId: "teal-lanka-daily-production",
        storageBucket: "teal-lanka-daily-production.firebasestorage.app",
        messagingSenderId: "410469764864",
        appId: "1:410469764864:web:e5390cb0d8d00781d86de5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.firestore().enablePersistence().catch(function(err) { console.log(err.code); });

    const today = new Date();
    document.getElementById('monthFilter').value = today.toISOString().substring(0, 7);

    renderMonthlySheet();
    document.getElementById('monthFilter').addEventListener('change', renderMonthlySheet);
    document.getElementById('operatorFilter').addEventListener('change', renderMonthlySheet);

    function renderMonthlySheet() {
        const tableBody = document.getElementById('productionTableBody');
        tableBody.innerHTML = `<tr><td colspan="9" style="color:blue; font-weight:bold; padding:20px; text-align:center;">Loading Book Data... Please Wait...</td></tr>`; 

        const selectedMonth = document.getElementById('monthFilter').value; 
        const selectedOperator = document.getElementById('operatorFilter').value; 

        const [year, month] = selectedMonth.split("-");
        const daysInMonth = new Date(year, month, 0).getDate(); 

        const tzOffset = (new Date()).getTimezoneOffset() * 60000;
        const localISODate = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];

        let monthlyTemplate = {};
        for (let d = 1; d <= daysInMonth; d++) {
            let dayStr = d < 10 ? `0${d}` : `${d}`;
            monthlyTemplate[`${selectedMonth}-${dayStr}`] = []; 
        }

        // 💡 ඔයාගේ ඔරිජිනල් Query එක එහෙම්මමයි, වෙනස් කලේ නැහැ.
        db.collection("Production_Records").orderBy("timestamp", "asc").get()
        .then((querySnapshot) => {
            tableBody.innerHTML = ""; 
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.operator === selectedOperator && data.date && monthlyTemplate[data.date] !== undefined) {
                    monthlyTemplate[data.date].push(data); 
                }
            });
            
            for (let dateKey in monthlyTemplate) {
                const recordsArray = monthlyTemplate[dateKey]; 
                const dayNumber = dateKey.split("-")[2]; 

                if (recordsArray.length > 0) {
                    recordsArray.forEach((record, index) => {
                        let row = `<tr class="filled-row">`;
                        
                        if (index === 0) {
                            row += `<td rowspan="${recordsArray.length}" style="vertical-align: middle; color: #333;"><b>${dayNumber}</b></td>`;
                        }
                        
                        row += `
                            <td>${record.plantCode || '-'}</td>
                            <td style="text-align:left; white-space: normal; word-break: break-word;">${record.variety || '-'}</td>
                            <td>${record.wk || '0'}</td>
                            <td>${record.transfer || '0'}</td>
                            <td>${record.used || '0'}</td>
                            <td>${record.multy || '0'}</td>
                            <td>${record.rooting || '0'}</td>
                            <td style="text-align:left; white-space: normal; word-break: break-word;">${record.remarks ? record.remarks : '-'}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                } else {
                    if (dateKey < localISODate) {
                        tableBody.innerHTML += `<tr class="empty-row">
                            <td><b>${dayNumber}</b></td>
                            <td colspan="8" style="text-align: center; font-weight: bold; color: #777;">Holiday</td>
                        </tr>`;
                    } else {
                        tableBody.innerHTML += `<tr class="empty-row">
                            <td><b>${dayNumber}</b></td>
                            <td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>
                        </tr>`;
                    }
                }
            }
        })
        .catch((error) => {
            tableBody.innerHTML = `<tr><td colspan="9" style="color: red; text-align:center;">Error loading data: ${error.message}</td></tr>`;
        });
    }
</script>
</body>
</html>
