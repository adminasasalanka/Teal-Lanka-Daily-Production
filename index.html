<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teal Lanka - Monthly Production Books</title>
    <style>
        /* Security Fix: Prevent Selection and Copying */
        html, body { 
            margin: 0; 
            padding: 0; 
            overflow-y: auto; \r\n            overflow-x: hidden; 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            color: #333; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Security Blackout Overlay */
        #securityOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 999999;
            color: white;
            text-align: center;
            padding-top: 50vh;
            font-family: Arial, sans-serif;
            font-size: 20px;
        }

        /* 🔄 Screen Rotate Animation Styles */
        @keyframes spinArrow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

<div id="rotateAlertModal" style="
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(10, 25, 47, 0.98); 
    z-index: 9999999; 
    justify-content: center; 
    align-items: center; 
    color: white; 
    text-align: center; 
    font-family: Arial, sans-serif;
    padding: 20px;
    box-sizing: border-box;
">
    <div>
        <div class="rotate-icon-wrapper" style="
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 25px auto;
        ">
            <div class="rotate-arrow" style="
                font-size: 80px;
                color: #00875a;
                line-height: 100px;
                animation: spinArrow 2s linear infinite;
            ">🔄</div>
        </div>

        <h2 style="margin: 0 0 10px 0; font-size: 22px; color: #ffffff; font-weight: bold;">Please Rotate Your Phone</h2>
        <p style="margin: 0; font-size: 15px; color: #a8b2d1; line-height: 1.5;">
            To view the monthly details clearly,<br>please turn on <b>Auto-Rotate</b> and hold your phone horizontally.
        </p>
    </div>
</div>

<div id="securityOverlay">Screen capturing is disabled for security reasons.</div>

<div class="container" style="padding: 20px;">
    <h2>Monthly Production Books</h2>
    <table border="1" style="width:100%; border-collapse: collapse; text-align: center;">
        <thead>
            <tr style="background-color: #00875a; color: white;">
                <th>Day</th>
                <th>Wk</th>
                <th>Transfer</th>
                <th>Used</th>
                <th>Multy</th>
                <th>Rooting</th>
                <th>Remarks</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // 📱 Screen Orientation එක පරීක්ෂා කරන ශ්‍රිතය (Function)
    function checkOrientation() {
        const rotateModal = document.getElementById('rotateAlertModal');
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

        if (isMobile) {
            if (window.innerHeight > window.innerWidth) {
                // ෆෝන් එක සිරස් (Portrait) නම් Popup එක පෙන්වන්න
                rotateModal.style.display = 'flex';
            } else {
                // ෆෝන් එක හරස් (Landscape) කළ විට Popup එක වසන්න
                rotateModal.style.display = 'none';
            }
        } else {
            // Computer එකකින් බලනවා නම් Popup එක අවශ්‍ය නැත
            rotateModal.style.display = 'none';
        }
    }

    // පිටුව Load වන විට සහ Screen එක හරවන විට ක්‍රියාත්මක වීමට Event Listeners
    window.addEventListener('load', checkOrientation);
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);

    // --- Firebase සහ අනෙකුත් Data Loading කේතයන් (ඔබේ පැරණි Script එක) ---
    // (උදාහරණයක් ලෙස දත්ත ඇතුළත් වන ආකාරය පහතින් දක්වා ඇත)
    const tableBody = document.getElementById('tableBody');
    
    // මෙතැනට ඔබේ සැබෑ Firebase දත්ත ලබාගන්නා ජාවාස්ක්‍රිප්ට් කේතය ඇතුළත් කරගන්න.
    // උදාහරණ පේළි සැකැස්ම:
    /*
    const row = `<tr>
        <td><b>1</b></td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td style="text-align:left;">-</td>
    </tr>`;
    tableBody.innerHTML += row;
    */
</script>
</body>
</html>
